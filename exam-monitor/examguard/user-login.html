<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login — ExamGuard</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="auth-page">
  <div class="auth-bg-blob"></div>
  <div class="auth-bg-blob2"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:2rem;margin-bottom:8px;">🎓</div>
      <h2>Student Login</h2>
      <p>Sign in to access your exams</p>
    </div>

    <div id="login-alert" class="alert"></div>

    <form id="login-form" style="display:flex;flex-direction:column;gap:16px;">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Your password" required/>
      </div>

      <button type="submit" id="login-btn" class="btn btn-green btn-full btn-lg" style="margin-top:4px;">
        Sign In &amp; Get OTP
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div style="text-align:center;font-size:0.88rem;color:var(--soft);">
      New student? <a href="register.html" style="color:var(--green-d);font-weight:500;">Create account</a>
      &nbsp;·&nbsp;
      <a href="index.html" style="color:var(--soft);">Back</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert('login-alert');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      setLoading('login-btn', true);
      try {
        await Api.login({ email, password });
        // Store email to use in OTP step
        localStorage.setItem('pendingEmail', email);
         Auth.setRole('ROLE_USER');
        showAlert('login-alert', 'OTP sent to your email!', 'success');
        setTimeout(() => window.location.href = 'otp.html', 1000);
      } catch (err) {
        showAlert('login-alert', err.message || 'Invalid email or password.');
      } finally {
        setLoading('login-btn', false, 'Sign In & Get OTP');
      }
    });
  </script>
</body>
</html>
